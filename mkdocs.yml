site_name: AlphaPIL
site_description: A powerful and easy-to-use image generation library for Python.
site_url: https://meralabs.dev/alphapil/docs/

theme:
  name: material
  palette:
    - scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - search.suggest
    - search.highlight
    - content.code.copy

markdown_extensions:
  - admonition
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true

nav:
  - Home: index.md
  - Getting Started: getting-started.md
  - Syntax Guide: syntax.md
  - Functions:
    - Core:
      - Overview: functions/core.md
      - createCanvas: functions/core/createCanvas.md
      - save: functions/core/save.md
      - setVar: functions/core/setVar.md
      - setFont: functions/core/setFont.md
      - loadFont: functions/core/loadFont.md
      - setColor: functions/core/setColor.md
      - setStroke: functions/core/setStroke.md
    - Geometric:
      - Overview: functions/geometric.md
      - drawRect: functions/geometric/drawRect.md
      - drawCircle: functions/geometric/drawCircle.md
      - drawRoundedRect: functions/geometric/drawRoundedRect.md
      - drawLine: functions/geometric/drawLine.md
      - drawPolygon: functions/geometric/drawPolygon.md
      - drawStar: functions/geometric/drawStar.md
      - drawArc: functions/geometric/drawArc.md
    - Text:
      - Overview: functions/text.md
      - drawText: functions/text/drawText.md
      - drawTextStroke: functions/text/drawTextStroke.md
      - drawTextGradient: functions/text/drawTextGradient.md
      - drawTextMid: functions/text/drawTextMid.md
    - Images:
      - Overview: functions/images.md
      - drawImage: functions/images/drawImage.md
      - imageFilter: functions/images/imageFilter.md
    - Masking:
      - createLayer: functions/masking/createLayer.md
      - mergeLayer: functions/masking/mergeLayer.md
    - Utils:
      - Overview: functions/utils.md
      - math: functions/utils/math.md
      - if: functions/utils/if.md
  - Examples: examples.md
